<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .tiktok-container { width: 90%; max-width: 400px; background: #121212; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; }
        .header span { color: #fe2c55; }
        .bio-text { height: 120px; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; font-size: 15px; line-height: 1.5; overflow-y: auto; }
        textarea { width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 12px; background: #fe2c55; border: none; border-radius: 5px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="tiktok-container">
    <div class="header"><div>Cancel</div><div style="color:red">Save</div></div>
    <div style="font-size: 20px; margin-bottom: 10px;">Bio</div>
    <div class="bio-text" id="display"></div>
    <textarea id="inputField" placeholder="বায়ো লিখুন..."></textarea>
    <button onclick="startTyping()">Start Typing</button>
</div>

<script>
    function startTyping() {
        const text = document.getElementById('inputField').value;
        const display = document.getElementById('display');
        display.innerText = "";
        let i = 0;
        
        function type() {
            if (i < text.length) {
                display.innerText += text.charAt(i);
                i++;
                // কিবোর্ড টাইপিংয়ের মতো ভেরিয়েবল গতির জন্য রেন্ডম ডিলে
                let speed = Math.random() * 150 + 50; 
                setTimeout(type, speed);
            }
        }
        type();
    }
</script>
</body>
</html>
