<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .tiktok-container { width: 100%; max-width: 400px; background: #121212; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        
        /* বায়ো বক্স যা লেখার সাথে বড় হবে */
        #display { 
            min-height: 50px; background: #1e1e1e; padding: 10px; border-radius: 8px; 
            margin-bottom: 15px; border: 1px solid #444; font-size: 16px; 
            white-space: pre-wrap; word-wrap: break-word; 
        }
        
        /* কাসর বা কার্সর এনিমেশন */
        .cursor { display: inline-block; width: 8px; height: 18px; background: #fe2c55; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        textarea { width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 12px; background: #fe2c55; border: none; border-radius: 5px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="tiktok-container">
    <div class="header"><div>Cancel</div><div style="color:red">Save</div></div>
    <div style="font-size: 18px; margin-bottom: 10px;">Bio</div>
    <div id="display"><span class="cursor"></span></div>
    <textarea id="inputField" placeholder="এখানে আপনার বায়ো লিখুন..."></textarea>
    <button onclick="startTyping()">Start Typing</button>
</div>

<script>
    function startTyping() {
        const text = document.getElementById('inputField').value;
        const display = document.getElementById('display');
        display.innerHTML = ""; // কার্সর বাদে সব ক্লিয়ার
        let i = 0;
        
        function type() {
            if (i < text.length) {
                // নতুন অক্ষর যোগ করা এবং কার্সরটি সবসময় শেষে রাখা
                display.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                i++;
                // টাইপিংয়ের গতি (মানুষের মতো ভেরিয়েবল)
                let speed = Math.random() * 150 + 50; 
                setTimeout(type, speed);
            } else {
                // টাইপিং শেষ হলে কার্সরটি সরিয়ে ফেলা (ঐচ্ছিক)
                display.innerHTML = text; 
            }
        }
        type();
    }
</script>
</body>
</html>
