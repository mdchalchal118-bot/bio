<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #display { width: 90%; max-width: 400px; min-height: 100px; background: #121212; padding: 15px; border-radius: 12px; border: 1px solid #333; font-size: 18px; white-space: pre-wrap; line-height: 1.6; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #fe2c55; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        .controls { position: fixed; bottom: 20px; display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border-radius: 20px; border: none; background: #333; color: white; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="display"><span class="cursor"></span></div>

<div class="controls">
    <button class="btn" onclick="document.getElementById('myModal').style.display='flex'">✎</button>
    <button class="btn" onclick="startTyping()">▶</button>
</div>

<div id="myModal" class="modal">
    <textarea id="inputField" style="width:80%; height:150px; background:#222; color:white; padding:10px; border:none;"></textarea>
    <button class="btn" style="background:#fe2c55; width:80%; margin-top:10px;" onclick="saveBio()">Save</button>
</div>

<script>
    let rawText = "";
    function saveBio() {
        rawText = document.getElementById('inputField').value;
        document.getElementById('myModal').style.display = 'none';
    }

    function startTyping() {
        const display = document.getElementById('display');
        display.innerHTML = '<span class="cursor"></span>';
        
        // ফরম্যাটিং লজিক
        let formatted = rawText
            .replace(/\[b\]/g, '<b>')
            .replace(/\[\/b\]/g, '</b>')
            .replace(/\[i\]/g, '<i>')
            .replace(/\[\/i\]/g, '</i>')
            .replace(/\[c\]/g, '<center>')
            .replace(/\[\/c\]/g, '</center>')
            .replace(/\[#([0-9A-Fa-f]{6})\]/g, '<span style="color:#$1;">')
            .replace(/\[\/color\]/g, '</span>');

        let i = 0;
        function type() {
            if (i <= formatted.length) {
                // সরাসরি HTML হিসেবে ইনজেক্ট করা হচ্ছে কিন্তু ক্যারেক্টার বাই ক্যারেক্টার
                display.innerHTML = formatted.substring(0, i) + '<span class="cursor"></span>';
                i++;
                setTimeout(type, Math.random() * 80 + 20); // মানুষের মতো টাইপিং গতির জন্য
            }
        }
        type();
    }
</script>
</body>
</html>
