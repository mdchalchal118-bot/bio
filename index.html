<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Editor</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .tiktok-container { width: 90%; max-width: 400px; background: #121212; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        
        #display { 
            min-height: 100px; background: #1e1e1e; padding: 15px; border-radius: 8px; 
            border: 1px solid #444; font-size: 18px; white-space: pre-wrap; word-wrap: break-word; 
        }
        
        /* কিবোর্ড কাসর এনিমেশন */
        .cursor { display: inline-block; width: 8px; height: 18px; background: #fe2c55; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; }
        button { padding: 10px; background: #fe2c55; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="tiktok-container">
    <div style="font-size: 20px; margin-bottom: 10px;">Bio</div>
    <div id="display"><span class="cursor"></span></div>
    
    <div class="controls">
        <textarea id="inputField" placeholder="এখানে আপনার লেখা লিখুন..."></textarea>
        <button onclick="startTyping()">Start Typing</button>
    </div>
</div>

<script>
    function startTyping() {
        const text = document.getElementById('inputField').value;
        const display = document.getElementById('display');
        display.innerHTML = ""; // আগের লেখা মুছে নতুন করে শুরু
        
        let i = 0;
        function type() {
            if (i < text.length) {
                // প্রতিবার অক্ষর যোগ করার সময় কার্সরটি শেষে রাখা
                display.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                i++;
                // টাইপিংয়ের গতি (মানুষের মতো ন্যাচারাল করার জন্য র‍্যান্ডম টাইম)
                let speed = Math.random() * 100 + 50; 
                setTimeout(type, speed);
            } else {
                // শেষ হওয়ার পর কার্সর সরিয়ে ফেলা বা রাখা
                display.innerHTML = text + '<span class="cursor"></span>';
            }
        }
        type();
    }
</script>
</body>
</html>
