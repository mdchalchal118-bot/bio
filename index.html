<!DOCTYPE html>
<html lang="bn">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding-top: 50px; }
        #display { 
            width: 90%; max-width: 400px; min-height: 250px; background: #121212; padding: 20px; 
            border-radius: 12px; border: 1px solid #333; font-size: 18px; 
            text-align: left; /* বাম দিক থেকে শুরু */
            white-space: pre-wrap; word-wrap: break-word; line-height: 1.6;
        }
        /* কার্সর চিকন করা হয়েছে */
        .cursor { display: inline-block; width: 2px; height: 18px; background: #fe2c55; animation: blink 0.8s infinite; vertical-align: middle; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .controls { position: fixed; bottom: 20px; display: flex; gap: 20px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; flex-direction: column; z-index: 2000; }
    </style>
</head>
<body>

<div id="display"><span class="cursor"></span></div>

<div class="controls">
    <button class="btn-circle" onclick="document.getElementById('modal').style.display='flex'">✎</button>
    <button class="btn-circle" onclick="startTyping()">▶</button>
</div>

<div id="modal" class="modal">
    <textarea id="inputField" placeholder="[b]বোল্ড[/b] [#ff0000]লাল লেখা[/color]" style="width:80%; height:150px; background:#222; color:white; padding:15px; border-radius:10px; border:1px solid #444;"></textarea>
    <button style="margin-top:20px; padding:10px 40px; background:#fe2c55; border:none; color:white; border-radius:25px;" onclick="saveAndClose()">Save</button>
</div>

<script>
    let savedText = "";
    function saveAndClose() {
        savedText = document.getElementById('inputField').value;
        document.getElementById('modal').style.display = 'none';
        document.getElementById('display').innerHTML = '<span class="cursor"></span>';
    }

    function startTyping() {
        const display = document.getElementById('display');
        
        // ট্যাগ ফরম্যাটিং
        let htmlContent = savedText
            .replace(/\[b\]/g, '<b>').replace(/\[\/b\]/g, '</b>')
            .replace(/\[i\]/g, '<i>').replace(/\[\/i\]/g, '</i>')
            .replace(/\[c\]/g, '<center>').replace(/\[\/c\]/g, '</center>')
            .replace(/\[#([0-9A-Fa-f]{6})\]/g, '<span style="color:#$1;">').replace(/\[\/color\]/g, '</span>');

        let i = 0;
        display.innerHTML = '<span class="cursor"></span>';
        
        function type() {
            if (i <= htmlContent.length) {
                // কিবোর্ড টাইপিংয়ের মতো অক্ষর যোগ হবে
                display.innerHTML = htmlContent.substring(0, i) + '<span class="cursor"></span>';
                i++;
                // ন্যাচারাল স্পিড: র্যান্ডমলি ৮০ থেকে ১৫০ মিলিসেকেন্ড
                setTimeout(type, Math.random() * 70 + 80); 
            }
        }
        type();
    }
</script>
</body>
</html>
