<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@rdx_lala1</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding-top: 20px; }
        
        /* উপরের ব্যানার বোর্ড */
        .header-board { background: #1a1a1a; padding: 15px 30px; border-radius: 50px; border: 2px solid #fe2c55; margin-bottom: 20px; text-align: center; width: 80%; max-width: 350px; }
        .channel-name { font-size: 22px; font-weight: bold; color: #fff; margin: 0; }
        .sub-text { font-size: 14px; color: #fe2c55; margin-top: 5px; }

        #display { 
            width: 90%; max-width: 400px; min-height: 250px; background: #121212; padding: 20px; 
            border-radius: 12px; border: 1px solid #333; font-size: 18px; 
            text-align: left; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6;
        }
        
        .cursor { display: inline-block; width: 2px; height: 18px; background: #fe2c55; animation: blink 0.8s infinite; vertical-align: middle; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .footer-note { margin-top: 20px; font-size: 14px; color: #888; text-align: center; width: 85%; }

        .controls { position: fixed; bottom: 30px; display: flex; gap: 30px; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fe2c55; color: white; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; flex-direction: column; z-index: 2000; }
    </style>
</head>
<body>

<div class="header-board">
    <div class="channel-name">@rdx_lala1</div>
    <div class="sub-text">Life is a beautiful struggle</div>
</div>

<div id="display"><span class="cursor"></span></div>

<div class="footer-note">আমাদের ক্যাপশন পড়ে ভালো লাগলে অবশ্যই লাইক, কমেন্ট ও শেয়ার করবেন। ধন্যবাদ!</div>

<div class="controls">
    <button class="btn-circle" onclick="document.getElementById('modal').style.display='flex'">✎</button>
    <button class="btn-circle" onclick="startTyping()">▶</button>
</div>

<div id="modal" class="modal">
    <textarea id="inputField" placeholder="এখানে আপনার বায়ো লিখুন..." style="width:80%; height:150px; background:#222; color:white; padding:15px; border-radius:10px; border:1px solid #444; font-size: 16px;"></textarea>
    <button style="margin-top:20px; padding:12px 40px; background:#fe2c55; border:none; color:white; border-radius:25px; font-weight:bold; cursor:pointer;" onclick="saveAndClose()">Save</button>
</div>

<script>
    let savedText = "";
    function saveAndClose() {
        savedText = document.getElementById('inputField').value;
        document.getElementById('modal').style.display = 'none';
        document.getElementById('display').innerHTML = '<span class="cursor"></span>';
    }

    function startTyping() {
        const display = document.getElementById('display');
        let htmlContent = savedText
            .replace(/\[b\]/g, '<b>').replace(/\[\/b\]/g, '</b>')
            .replace(/\[i\]/g, '<i>').replace(/\[\/i\]/g, '</i>')
            .replace(/\[c\]/g, '<center>').replace(/\[\/c\]/g, '</center>')
            .replace(/\[#([0-9A-Fa-f]{6})\]/g, '<span style="color:#$1;">').replace(/\[\/color\]/g, '</span>');

        let i = 0;
        display.innerHTML = '<span class="cursor"></span>';
        
        function type() {
            if (i <= htmlContent.length) {
                display.innerHTML = htmlContent.substring(0, i) + '<span class="cursor"></span>';
                i++;
                setTimeout(type, Math.random() * 80 + 70); 
            }
        }
        type();
    }
</script>
</body>
</html>
