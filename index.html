<!DOCTYPE html>
<html lang="bn">
<head>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .ui-container { width: 350px; background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .top-screen { height: 150px; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; position: relative; }
        #display-text { font-size: 16px; color: #eee; }
        .cursor { display: inline-block; width: 2px; height: 18px; background: red; animation: blink 1s infinite; }
        textarea { width: 100%; height: 80px; background: #2c2c2c; color: white; border: none; padding: 10px; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 12px; background: #fe2c55; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="ui-container">
    <div class="top-screen">
        <div id="display-text"></div><span class="cursor"></span>
    </div>
    <textarea id="inputField" placeholder="এখানে আপনার বায়ো লিখুন..."></textarea>
    <button onclick="startAutoType()">Start Typing</button>
</div>

<script>
    function startAutoType() {
        const text = document.getElementById('inputField').value;
        const display = document.getElementById('display-text');
        display.innerText = "";
        let i = 0;
        
        function type() {
            if (i < text.length) {
                display.innerText += text.charAt(i);
                i++;
                // মানুষের মতো টাইপিংয়ের জন্য রেন্ডম ডিলে (গতি পরিবর্তন)
                let speed = Math.random() * (200 - 50) + 50; 
                setTimeout(type, speed);
            }
        }
        type();
    }
</script>
</body>
</html>
